<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sign Up | Library Management</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
	<nav class="navbar navbar-expand-lg navbar-dark app-navbar sticky-top shadow-sm">
		<div class="container py-2">
			<a class="navbar-brand fw-semibold d-flex align-items-center gap-2" href="/">
				<i class="bi bi-book-half fs-4"></i>
				<span>Library Management System</span>
			</a>
		</div>
	</nav>

	<main class="container auth-shell py-5">
		<div class="row justify-content-center g-4">
			<div class="col-lg-5 fade-up">
				<div class="app-hero p-4 p-md-5 h-100">
					<div class="text-uppercase small text-white-50 fw-semibold mb-3">Create access</div>
					<h1 class="display-6 fw-bold mb-3">Join the library</h1>
					<p class="text-white-50 mb-0">Create your account to manage library books and your profile securely.</p>
				</div>
			</div>
			<div class="col-lg-7 fade-up-delay-1">
				<div class="auth-panel p-4 p-md-5">
					<h2 class="h3 fw-bold mb-2">Create Account</h2>
					<p class="text-muted mb-4">Fill in the details below to register.</p>

					<div th:if="${signupError}" class="alert alert-danger" th:text="${signupError}"></div>

					<form th:action="@{/signup}" th:object="${user}" method="post" class="row g-3">
						<div class="col-md-6">
							<label for="fullName" class="form-label fw-semibold">Full Name</label>
							<input type="text" id="fullName" th:field="*{fullName}" class="form-control" placeholder="Enter full name">
							<div class="text-danger small mt-1" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
						</div>
						<div class="col-md-6">
							<label for="email" class="form-label fw-semibold">Email Address</label>
							<input type="email" id="email" th:field="*{email}" class="form-control" placeholder="you@example.com">
							<div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
						</div>
						<div class="col-md-6">
							<label for="phoneNumber" class="form-label fw-semibold">Phone Number</label>
							<input type="tel" id="phoneNumber" th:field="*{phoneNumber}" class="form-control" placeholder="10 to 15 digits">
							<div class="text-danger small mt-1" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
						</div>
						<div class="col-md-6">
							<label for="password" class="form-label fw-semibold">Password</label>
							<input type="password" id="password" name="password" th:field="*{password}" class="form-control" placeholder="Minimum 8 characters" data-password-strength>
							<div class="password-meter mt-2"><div class="password-meter-bar" data-password-meter></div></div>
							<div class="d-flex justify-content-between mt-1">
								<span class="small text-muted">Password strength</span>
								<span class="small fw-semibold" data-password-strength-text>Weak</span>
							</div>
							<div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
						</div>
						<div class="col-md-6">
							<label for="confirmPassword" class="form-label fw-semibold">Confirm Password</label>
							<input type="password" id="confirmPassword" name="confirmPassword" class="form-control" placeholder="Re-enter password">
							<div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
						</div>
						<div class="col-12">
							<div class="form-check">
								<input class="form-check-input" type="checkbox" id="acceptedTerms" th:field="*{acceptedTerms}">
								<label class="form-check-label" for="acceptedTerms">I agree to the Terms &amp; Conditions and Privacy Policy.</label>
							</div>
							<div class="text-danger small mt-1" th:if="${#fields.hasErrors('acceptedTerms')}" th:errors="*{acceptedTerms}"></div>
						</div>
						<div class="col-12 d-grid gap-2 pt-2">
							<button type="submit" class="btn btn-primary btn-lg app-btn">Create Account</button>
						</div>
					</form>

					<hr class="my-4">
					<p class="mb-0 text-muted">Already have an account? <a href="/login" class="text-decoration-none fw-semibold">Login</a></p>
				</div>
			</div>
		</div>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script th:src="@{/js/auth.js}"></script>
</body>
</html>
