<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Dashboard | Library Management</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
	<nav class="navbar navbar-expand-lg navbar-dark app-navbar sticky-top shadow-sm">
		<div class="container py-2">
			<a class="navbar-brand fw-semibold d-flex align-items-center gap-2" href="#">
				<i class="bi bi-book-half fs-4"></i>
				<span>Library Management System</span>
			</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarNav">
				<ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
					<li class="nav-item"><a class="nav-link active" href="/dashboard">Dashboard</a></li>
					<li class="nav-item"><a class="nav-link" href="/books-ui">Books</a></li>
					<li class="nav-item dropdown">
						<a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">My Profile</a>
						<ul class="dropdown-menu dropdown-menu-end">
							<li><a class="dropdown-item" href="/profile">My Profile</a></li>
							<li><a class="dropdown-item" href="/change-password">Change Password</a></li>
							<li><hr class="dropdown-divider"></li>
							<li>
								<form th:action="@{/logout}" method="post" class="px-3">
									<button type="submit" class="btn btn-link text-danger p-0 text-decoration-none">Logout</button>
								</form>
							</li>
						</ul>
					</li>
				</ul>
			</div>
		</div>
	</nav>

	<main class="container py-5">
		<section class="app-hero p-4 p-md-5 mb-4 fade-up">
			<div class="row align-items-center g-4">
				<div class="col-lg-8">
					<div class="text-uppercase small text-white-50 fw-semibold mb-2">Overview</div>
					<h1 class="display-6 fw-bold mb-3">Welcome, <span th:text="${currentUser != null ? currentUser.fullName : 'User'}">User</span></h1>
					<p class="lead text-white-50 mb-0">Use the dashboard to review circulation status and jump into library tasks.</p>
				</div>
				<div class="col-lg-4">
					<div class="bg-white text-dark rounded-4 p-4 shadow-sm">
						<div class="d-flex align-items-center justify-content-between mb-2">
							<div>
								<div class="text-uppercase text-muted small fw-semibold">Signed in as</div>
								<div class="h5 mb-0" th:text="${currentUser != null ? currentUser.email : ''}"></div>
							</div>
							<div class="metric-icon"><i class="bi bi-person-circle"></i></div>
						</div>
						<p class="text-muted mb-0" th:text="${currentUser != null ? currentUser.phoneNumber : ''}"></p>
					</div>
				</div>
			</div>
		</section>

		<div class="row g-4">
			<div class="col-md-4 fade-up-delay-1">
				<div class="app-card-soft p-4 h-100 bg-white">
					<div class="d-flex align-items-center justify-content-between mb-3">
						<div class="text-uppercase small fw-semibold text-muted">Total Books</div>
						<div class="metric-icon"><i class="bi bi-bookshelf"></i></div>
					</div>
					<div class="display-6 fw-bold" th:text="${totalBooks}">0</div>
				</div>
			</div>
			<div class="col-md-4 fade-up-delay-2">
				<div class="app-card-soft p-4 h-100 bg-white">
					<div class="d-flex align-items-center justify-content-between mb-3">
						<div class="text-uppercase small fw-semibold text-muted">Available Books</div>
						<div class="metric-icon"><i class="bi bi-check2-circle"></i></div>
					</div>
					<div class="display-6 fw-bold" th:text="${availableBooks}">0</div>
				</div>
			</div>
			<div class="col-md-4 fade-up-delay-3">
				<div class="app-card-soft p-4 h-100 bg-white">
					<div class="d-flex align-items-center justify-content-between mb-3">
						<div class="text-uppercase small fw-semibold text-muted">Issued Books</div>
						<div class="metric-icon"><i class="bi bi-journal-arrow-up"></i></div>
					</div>
					<div class="display-6 fw-bold" th:text="${issuedBooks}">0</div>
				</div>
			</div>
		</div>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
