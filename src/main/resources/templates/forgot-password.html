<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Forgot Password | Library Management</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
	<div class="container py-5 auth-shell">
		<div class="row justify-content-center">
			<div class="col-lg-6 fade-up">
				<div class="auth-panel p-4 p-md-5">
					<h1 class="h3 fw-bold mb-2">Forgot Password</h1>
					<p class="text-muted mb-4">Enter your registered email address and we will guide you through the reset flow.</p>

					<div th:if="${forgotPasswordMessage}" class="alert alert-success" th:text="${forgotPasswordMessage}"></div>

					<form th:action="@{/forgot-password}" method="post" class="row g-3">
						<div class="col-12">
							<label for="email" class="form-label fw-semibold">Email Address</label>
							<input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required>
						</div>
						<div class="col-12 d-grid pt-2">
							<button type="submit" class="btn btn-primary btn-lg app-btn">Send Reset Link</button>
						</div>
					</form>

					<p class="mt-4 mb-0"><a href="/login" class="text-decoration-none">Back to login</a></p>
				</div>
			</div>
		</div>
	</div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
