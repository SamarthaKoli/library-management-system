<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>My Profile | Library Management</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
	<nav class="navbar navbar-expand-lg navbar-dark app-navbar sticky-top shadow-sm">
		<div class="container py-2">
			<a class="navbar-brand fw-semibold d-flex align-items-center gap-2" href="/dashboard">
				<i class="bi bi-book-half fs-4"></i>
				<span>Library Management System</span>
			</a>
		</div>
	</nav>

	<main class="container py-5">
		<div class="row justify-content-center">
			<div class="col-lg-8 fade-up">
				<div class="auth-panel p-4 p-md-5">
					<div th:if="${profileMessage}" class="alert alert-success" th:text="${profileMessage}"></div>
					<h1 class="h3 fw-bold mb-2">My Profile</h1>
					<p class="text-muted mb-4">Review your account information and update your contact details.</p>

					<form th:action="@{/profile}" method="post" class="row g-3">
						<div class="col-md-6">
							<label class="form-label fw-semibold">Full Name</label>
							<input type="text" name="fullName" class="form-control" th:value="${currentUser.fullName}" required>
						</div>
						<div class="col-md-6">
							<label class="form-label fw-semibold">Email Address</label>
							<input type="email" class="form-control" th:value="${currentUser.email}" readonly>
						</div>
						<div class="col-md-6">
							<label class="form-label fw-semibold">Phone Number</label>
							<input type="tel" name="phoneNumber" class="form-control" th:value="${currentUser.phoneNumber}" required>
						</div>
						<div class="col-12 d-flex gap-2 pt-2">
							<button type="submit" class="btn btn-primary app-btn">Save Changes</button>
							<a href="/dashboard" class="btn btn-outline-secondary app-btn">Back</a>
						</div>
					</form>
				</div>
			</div>
		</div>
	</main>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
