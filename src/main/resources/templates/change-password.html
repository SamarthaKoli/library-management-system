<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Change Password | Library Management</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
	<div class="container py-5 auth-shell">
		<div class="row justify-content-center">
			<div class="col-lg-7 fade-up">
				<div class="auth-panel p-4 p-md-5">
					<div th:if="${passwordError}" class="alert alert-danger" th:text="${passwordError}"></div>
					<div th:if="${passwordMessage}" class="alert alert-success" th:text="${passwordMessage}"></div>
					<h1 class="h3 fw-bold mb-2">Change Password</h1>
					<p class="text-muted mb-4">Update your account password securely.</p>

					<form th:action="@{/change-password}" method="post" class="row g-3">
						<div class="col-12">
							<label class="form-label fw-semibold">Current Password</label>
							<input type="password" name="currentPassword" class="form-control" required>
						</div>
						<div class="col-md-6">
							<label class="form-label fw-semibold">New Password</label>
							<input type="password" name="newPassword" class="form-control" required minlength="8">
						</div>
						<div class="col-md-6">
							<label class="form-label fw-semibold">Confirm New Password</label>
							<input type="password" name="confirmPassword" class="form-control" required minlength="8">
						</div>
						<div class="col-12 d-flex gap-2 pt-2">
							<button type="submit" class="btn btn-primary app-btn">Update Password</button>
							<a href="/dashboard" class="btn btn-outline-secondary app-btn">Cancel</a>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
